name: SkillStorm CI + E2E

on:
  push:
    branches: [main, develop]
  pull_request:

jobs:
  e2e:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: skillstormdb
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/skillstormdb
      JWT_SECRET: ci-secret
      NODE_ENV: production
      DISABLE_BOOTSTRAP_SEARCH: 1
      PORT: 4200
      NEXT_PUBLIC_API_URL: http://localhost:4200
      BASE_URL: http://localhost:3001

    steps:
      - uses: actions/checkout@v4

      - name: ⚙️ Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"
          cache-dependency-path: |
            client/package-lock.json
            server/package-lock.json

      # --- Backend setup ---
      - name: 📦 Install backend dependencies
        working-directory: ./server
        run: npm ci

      - name: 🏗️ Build backend
        working-directory: ./server
        run: npx nest build

      - name: 🔍 Verify build output
        run: |
          ls -R server/dist || echo "❌ No build output found"

      - name: 🕓 Wait for Postgres
        run: |
          until pg_isready -h localhost -p 5432 -U postgres; do
            echo "Waiting for Postgres..."
            sleep 2
          done

      - name: 🚀 Start backend
        run: |
          cd server
          nohup node dist/main.js > server.log 2>&1 &

      - name: 🧾 Tail backend log
        run: |
          echo "===== BACKEND START LOG ====="
          sleep 5
          cat server/server.log || echo "server.log not found"

      - name: 🩺 Wait for backend to start
        run: |
          echo "⏳ Waiting for backend..."
          npx wait-on -t 120000 http://localhost:4200/health
          echo "✅ Backend is up!"

      # --- Frontend setup ---
      - name: 📦 Install frontend dependencies
        working-directory: ./client
        run: npm ci

      - name: ⚙️ Build frontend
        working-directory: ./client
        run: npm run build

      - name: 🚀 Start frontend
        run: |
          cd client
          nohup npm run start > client.log 2>&1 &

      - name: ⏳ Wait for frontend
        run: npx wait-on -t 120000 http://localhost:3001

      - name: 🎭 Install Playwright browsers
        working-directory: ./client
        run: npx playwright install --with-deps

      - name: 🧪 Run Playwright E2E tests
        working-directory: ./client
        run: npm run test:e2e

      - name: 🧾 Show backend logs (if failed)
        if: failure()
        run: cat server/server.log || true

      - name: ✅ E2E completed
        run: echo "✅ E2E pipeline completed successfully."
