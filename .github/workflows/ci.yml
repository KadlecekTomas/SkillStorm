name: SkillStorm CI (Simplified)

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: skillstormdb
        ports:
          - 5432:5432

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/skillstormdb
      JWT_SECRET: ci-secret
      NODE_ENV: production
      PORT: 4200

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # FRONTEND
      - name: Build frontend
        working-directory: ./client
        run: |
          npm ci
          npm run build

      # BACKEND
      - name: Build backend & seed DB
        working-directory: ./server
        run: |
          npm ci
          npx prisma generate
          npx prisma migrate deploy
          npm run build
          npm run prisma:seed

      - name: ✅ Done
        run: echo "✅ Build + Seed passed successfully"
