name: SkillStorm CI (Simplified)

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: skillstormdb
        ports:
          - 5432:5432

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/skillstormdb
      JWT_SECRET: ci-secret
      NODE_ENV: production
      PORT: 4200

    steps:
      - uses: actions/checkout@v4

      - name: ⚙️ Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # === FRONTEND ===
      - name: 🧱 Build frontend
        working-directory: ./client
        # NODE_ENV=production strips devDeps from `npm ci`; --include=dev keeps
        # build tooling. next.config requires API_PROXY_TARGET in production.
        env:
          API_PROXY_TARGET: http://localhost:4200
        run: |
          npm ci --include=dev
          npm run build

      - name: 🧪 FE policy tests
        working-directory: ./client
        run: |
          npx playwright install --with-deps
          npm run test:fe-policy

      # === BACKEND ===
      - name: 🧩 Ensure Nest CLI available
        working-directory: ./server
        run: npm install --save-dev @nestjs/cli

      - name: 🧱 Build backend & seed DB
        working-directory: ./server
        # --include=dev: NODE_ENV=production would otherwise omit devDeps
        # (@types/*, tsconfig-paths) and break typecheck + seed path aliases.
        run: |
          npm ci --include=dev
          npm install -g @nestjs/cli
          npm run prisma:generate
          npx prisma migrate deploy
          npm run typecheck
          npm run build
          npm run test:policy
          npm run prisma:seed

      - name: 🧹 Lint backend (non-blocking until cleanup)
        continue-on-error: true
        working-directory: ./server
        run: npm run lint

      - name: 🔐 RBAC server tests
        working-directory: ./server
        run: npm run test -- rbac

      - name: 🔐 RBAC frontend tests
        working-directory: ./client
        run: npm run test:rbac:client

      - name: 🎮 Gamification tests
        run: npm run test:gamification

      - name: RBAC – controller decorator check
        run: npm run check:rbac

      - name: ✅ Done
        run: echo "✅ Build + Seed passed successfully"

  # Onboarding invariant: DB + auth contract. Must pass in CI; no .env.test needed (DATABASE_URL from job).
  onboarding-invariant-check:
    name: Onboarding invariant (backend E2E)
    runs-on: ubuntu-latest
    needs: []

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: skillstormdb
        ports:
          - 5432:5432

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/skillstormdb
      JWT_SECRET: ci-secret
      NODE_ENV: test
      PORT: 0

    steps:
      - uses: actions/checkout@v4

      - name: ⚙️ Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: 🧩 Backend deps & Prisma
        working-directory: ./server
        run: |
          npm ci
          npm run prisma:generate

      - name: 🧪 Onboarding create-org E2E (DB + auth contract)
        working-directory: ./server
        run: |
          npx jest --config ./test/jest-e2e.config.js --testPathPattern="organizations.e2e-spec" --testNamePattern="Onboarding create-org" --runInBand

  # Frontend onboarding E2E: runs only when E2E_ONBOARDING_* are set; in CI we set them and start backend.
  onboarding-invariant-e2e:
    name: Onboarding invariant (frontend E2E)
    runs-on: ubuntu-latest
    needs: []

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: skillstormdb
        ports:
          - 5432:5432

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/skillstormdb
      JWT_SECRET: ci-secret
      NODE_ENV: production
      SUPERADMIN_EMAIL: admin@skillstorm.local
      SUPERADMIN_PASSWORD: CiAdminPassword1!
      E2E_SEED_ONBOARDING_USER: "1"
      E2E_ONBOARDING_EMAIL: onboarding@skillstorm.local
      E2E_ONBOARDING_PASSWORD: Password123!
      BASE_URL: http://127.0.0.1:3000
      API_PROXY_TARGET: http://localhost:4200
      CI: "true"

    steps:
      - uses: actions/checkout@v4

      - name: ⚙️ Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: 🧩 Backend setup & seed (with E2E onboarding user)
        working-directory: ./server
        # --include=dev: NODE_ENV=production strips devDeps (@nestjs/cli,
        # tsconfig-paths) needed by build + seed path aliases.
        run: |
          npm ci --include=dev
          npm run prisma:generate
          npx prisma migrate deploy
          npm run build
          npm run prisma:seed

      - name: 📦 Frontend deps & Playwright
        working-directory: ./client
        run: |
          npm ci --include=dev
          npx playwright install --with-deps chromium

      - name: 🎬 Onboarding E2E (backend + frontend, routing + context.mode)
        run: |
          (cd server && npm run start) &
          for i in $(seq 1 45); do curl -s -o /dev/null http://localhost:4200 && break; sleep 1; done
          cd client && npx playwright test tests/e2e/onboarding-create-org.spec.ts
