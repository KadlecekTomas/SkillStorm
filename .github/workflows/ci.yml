name: SkillStorm CI (Simplified)

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: skillstorm_test
        ports:
          - 5432:5432

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/skillstorm_test
      DATABASE_URL_TEST: postgresql://postgres:postgres@localhost:5432/skillstorm_test
      # Synthetic CI-only values (hex — the production secret validator
      # rejects anything containing weak markers like "secret"/"test"/"dev").
      JWT_SECRET: 4f8c1e6a2b9d7350a1c8e4f62b0d935a7c1e8f402b6d9153a8c0e7f42b5d961c
      JWT_ACCESS_SECRET: 4f8c1e6a2b9d7350a1c8e4f62b0d935a7c1e8f402b6d9153a8c0e7f42b5d961c
      JWT_REFRESH_SECRET: 9d2b7f40c6a1e8535f0c3b96d2e7a140b8f5c2091e6d3a74c0b9f6e13d8a52c7
      COOKIE_SECRET: 71e4c9a2f6b0d8535a2e7c1094f6b3d8072c5e9a1f4b8d63095c2e7f1a4b8d60
      METRICS_INGEST_KEY: 2c8f5a1e9b4d7063f1a8c5e20b7d4a9163f0c8e5a2b9d7461305f8c2e9a6b4d1
      CORS_ORIGINS: http://localhost:3000
      PUBLIC_APP_URL: http://localhost:3000
      API_URL: http://localhost:4200
      SUPERADMIN_EMAIL: admin@skillstorm.local
      SUPERADMIN_PASSWORD: CiAdminPassword1!
      # test, ne production: job je testovací gate — production režim zapíná
      # CSRF/throttle/secret validace, které rozbíjejí supertest/playwright
      # kroky (produkční build kryje production-gate.yml). FE build krok si
      # NODE_ENV=production nastavuje sám.
      NODE_ENV: test
      PORT: 4200

    steps:
      - uses: actions/checkout@v4

      - name: ⚙️ Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # === FRONTEND ===
      - name: 🧱 Build frontend
        working-directory: ./client
        # NODE_ENV=production strips devDeps from `npm ci`; --include=dev keeps
        # build tooling. next.config requires API_PROXY_TARGET in production.
        env:
          API_PROXY_TARGET: http://localhost:4200
          NODE_ENV: production
        run: |
          npm ci --include=dev
          npm run build

      - name: 🧪 FE component policy tests
        working-directory: ./client
        env:
          NODE_ENV: test
        run: |
          npx playwright install --with-deps
          npm run test:fe-components

      # === BACKEND ===
      - name: 🧱 Build backend & seed DB
        working-directory: ./server
        # --include=dev: NODE_ENV=production would otherwise omit devDeps
        # (@types/*, tsconfig-paths) and break typecheck + seed path aliases.
        run: |
          npm ci --include=dev
          npm install -g @nestjs/cli
          npm run prisma:generate
          npx prisma migrate deploy
          npm run typecheck
          npm run build
          npm run test:policy
          npm run prisma:seed

      - name: 🧹 Lint backend (non-blocking until cleanup)
        continue-on-error: true
        working-directory: ./server
        run: npm run lint

      - name: 🔐 RBAC server tests
        working-directory: ./server
        run: npm run test -- rbac

      - name: 🔐 RBAC frontend tests
        working-directory: ./client
        run: npm run test:rbac:client

      - name: 🎮 Gamification tests
        run: npm run test:gamification

      - name: RBAC – controller decorator check
        run: npm run check:rbac

      - name: ✅ Done
        run: echo "✅ Build + Seed passed successfully"

  # Onboarding invariant: DB + auth contract. Must pass in CI; no .env.test needed (DATABASE_URL from job).
  onboarding-invariant-check:
    name: Onboarding invariant (backend E2E)
    runs-on: ubuntu-latest
    needs: []

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: skillstorm_test
        ports:
          - 5432:5432

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/skillstorm_test
      DATABASE_URL_TEST: postgresql://postgres:postgres@localhost:5432/skillstorm_test
      JWT_SECRET: ci-secret
      NODE_ENV: test
      PORT: 0

    steps:
      - uses: actions/checkout@v4

      - name: ⚙️ Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: 🧩 Backend deps & Prisma
        working-directory: ./server
        run: |
          npm ci
          npm run prisma:generate
          npx prisma migrate deploy

      # organizations.e2e-spec was quarantined to test/e2e-legacy (drifted);
      # the onboarding/org-creation contract is covered by these green suites.
      - name: 🧪 Onboarding contract E2E (register + pending-org access)
        working-directory: ./server
        run: |
          npx jest --config ./test/jest-e2e.config.js --testPathPattern="(register-onboarding-contract|pending-org-onboarding-access)" --runInBand

  # Frontend onboarding E2E: runs only when E2E_ONBOARDING_* are set; in CI we set them and start backend.
  onboarding-invariant-e2e:
    name: Onboarding invariant (frontend E2E)
    runs-on: ubuntu-latest
    needs: []

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: skillstorm_test
        ports:
          - 5432:5432

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/skillstorm_test
      DATABASE_URL_TEST: postgresql://postgres:postgres@localhost:5432/skillstorm_test
      # Synthetic CI-only values (hex — bez slabých markerů pro secret validátor).
      JWT_SECRET: 4f8c1e6a2b9d7350a1c8e4f62b0d935a7c1e8f402b6d9153a8c0e7f42b5d961c
      JWT_ACCESS_SECRET: 4f8c1e6a2b9d7350a1c8e4f62b0d935a7c1e8f402b6d9153a8c0e7f42b5d961c
      JWT_REFRESH_SECRET: 9d2b7f40c6a1e8535f0c3b96d2e7a140b8f5c2091e6d3a74c0b9f6e13d8a52c7
      COOKIE_SECRET: 71e4c9a2f6b0d8535a2e7c1094f6b3d8072c5e9a1f4b8d63095c2e7f1a4b8d60
      METRICS_INGEST_KEY: 2c8f5a1e9b4d7063f1a8c5e20b7d4a9163f0c8e5a2b9d7461305f8c2e9a6b4d1
      CORS_ORIGINS: http://127.0.0.1:3001,http://localhost:3001
      PUBLIC_APP_URL: http://127.0.0.1:3001
      API_URL: http://127.0.0.1:4200
      # development, ne production: production režim zakazuje DISABLE_CSRF=1
      # a job testuje routing/context.mode invariant, ne produkční env
      # (to kryje production-gate.yml). Backend přesto běží z dist buildu.
      NODE_ENV: development
      SUPERADMIN_EMAIL: admin@skillstorm.local
      SUPERADMIN_PASSWORD: CiAdminPassword1!
      E2E_SEED_ONBOARDING_USER: "1"
      E2E_ONBOARDING_EMAIL: onboarding@skillstorm.local
      E2E_ONBOARDING_PASSWORD: Password123!
      # playwright.config webServer serves the frontend on :3001
      BASE_URL: http://127.0.0.1:3001
      API_PROXY_TARGET: http://localhost:4200
      DISABLE_CSRF: "1"
      CI: "true"

    steps:
      - uses: actions/checkout@v4

      - name: ⚙️ Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: 🧩 Backend setup & seed (with E2E onboarding user)
        working-directory: ./server
        # --include=dev: NODE_ENV=production strips devDeps (@nestjs/cli,
        # tsconfig-paths) needed by build + seed path aliases.
        run: |
          npm ci --include=dev
          npm run prisma:generate
          npx prisma migrate deploy
          npm run build
          # seed.ts (bootstrap) creates the E2E onboarding user; prisma:seed
          # points at the e2e dataset seed and does NOT create it.
          npm run seed:bootstrap

      - name: 📦 Frontend deps & Playwright
        working-directory: ./client
        run: |
          npm ci --include=dev
          npx playwright install --with-deps chromium

      - name: 🎬 Onboarding E2E (backend + frontend, routing + context.mode)
        run: |
          (cd server && npm run start) &
          for i in $(seq 1 45); do curl -s -o /dev/null http://localhost:4200 && break; sleep 1; done
          cd client && npx playwright test tests/e2e/onboarding-create-org.spec.ts
