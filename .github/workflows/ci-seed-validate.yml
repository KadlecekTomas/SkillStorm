name: SkillStorm CI – Seed & Validate

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main", "develop" ]

jobs:
  seed-and-validate:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        ports:
          - "5432:5432"
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: skillstorm_test
        options: >-
          --health-cmd="pg_isready -U postgres"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    env:
      DATABASE_URL: postgres://postgres:postgres@localhost:5432/skillstorm_test
      DATABASE_URL_TEST: postgres://postgres:postgres@localhost:5432/skillstorm_test

    steps:
      - name: 🧩 Checkout repository
        uses: actions/checkout@v4

      - name: ⚙️ Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"
          cache-dependency-path: |
            client/package-lock.json
            server/package-lock.json

      - name: 📦 Install dependencies
        run: npm ci
        working-directory: server

      - name: 🛠️ Generate Prisma client
        run: npx prisma generate
        working-directory: server

      - name: 🧱 Run database migrations
        run: npx prisma migrate deploy
        working-directory: server

      - name: 🌱 Seed the database
        # Use the npm script so the @/ path alias resolves (tsconfig-paths/register).
        run: npm run prisma:seed
        working-directory: server

      - name: 🔍 Validate seed data
        run: npm run seed:validate
        working-directory: server

      - name: ✅ Done
        if: success()
        run: echo "All seed data validated successfully 🎉"
