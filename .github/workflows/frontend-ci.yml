name: Frontend CI Quality Gate

on:
  push:
    branches: [main]
  pull_request:
    branches: ["*"]

jobs:
  frontend-quality-gate:
    name: Frontend Quality Gate
    runs-on: ubuntu-latest
    timeout-minutes: 20

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: skillstorm_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    env:
      # Shared by the Playwright backend web-server (playwright.config.ts).
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/skillstorm_test?schema=public
      JWT_SECRET: ci-secret
      API_PROXY_TARGET: http://localhost:4200

    defaults:
      run:
        working-directory: ./client

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: ⚙️ Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: client/package-lock.json

      - name: 📦 Install dependencies
        run: npm ci

      - name: 🔍 Lint code
        continue-on-error: true # Non-blocking until the planned lint cleanup lands.
        run: npm run lint

      - name: 🔎 Type check
        run: npm run typecheck

      - name: 🧪 Run unit/component tests
        run: npm run test:unit

      - name: 🎭 Install Playwright browsers
        run: npx playwright install --with-deps chromium

      # Playwright's webServer boots the NestJS backend (npm run start:dev
      # --prefix ../server). Without server deps the `nest` CLI is missing
      # ("nest: not found") and there is no migrated DB to connect to.
      - name: 🧩 Backend setup for E2E
        working-directory: ./server
        run: |
          npm ci --include=dev
          npm run prisma:generate
          npx prisma migrate deploy

      - name: 🎬 Run E2E tests
        run: npm run test:e2e
        env:
          CI: true
          # Frontend web-server in playwright.config starts on port 3001.
          BASE_URL: http://127.0.0.1:3001

      - name: 🏗️ Build Next.js application
        run: npm run build
        env:
          NODE_ENV: production
