services:
  postgres:
    image: postgres:15-alpine
    restart: unless-stopped
    profiles: ["dev", "staging", "prod"]
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-skillstorm}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT:-5432}:5432"

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    profiles: ["dev", "staging", "prod"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./server
      dockerfile: Dockerfile
      target: runner
    profiles: ["dev", "staging", "prod"]
    env_file:
      - .env
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      PORT: 4200
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-skillstorm}
      JWT_SECRET: ${JWT_SECRET:-change-me}
      REDIS_URL: redis://redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "${BACKEND_PORT:-4201}:4200"

  frontend:
    build:
      context: ./client
      dockerfile: Dockerfile
      target: runner
      args:
        API_PROXY_TARGET: http://backend:4200
    profiles: ["dev", "staging", "prod"]
    env_file:
      - .env
    environment:
      PORT: 3000
      API_PROXY_TARGET: http://backend:4200
      NODE_ENV: ${NODE_ENV:-production}
    depends_on:
      backend:
        condition: service_started
    ports:
      - "3000:3000"

volumes:
  pgdata:
