# All services use the same network so they resolve by service name (e.g. backend, postgres).
# Frontend proxy target: inside Docker use http://backend:4200; locally use http://localhost:4200.
networks:
  app:
    driver: bridge

services:
  postgres:
    image: postgres:15-alpine
    restart: unless-stopped
    profiles: ["dev", "staging", "prod"]
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-skillstorm}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    networks:
      - app

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    profiles: ["dev", "staging", "prod"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app

  # One-off: spustí full walkthrough seed (npm run seed:full). Po dokončení kontejner skončí.
  # Použití: docker compose --profile dev up -d postgres && docker compose --profile dev run --rm seed-full
  seed-full:
    build:
      context: ./server
      dockerfile: Dockerfile
      target: seed-runner
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-skillstorm}
    depends_on:
      postgres:
        condition: service_healthy
    profiles: ["dev", "staging", "prod"]
    networks:
      - app

  backend:
    build:
      context: ./server
      dockerfile: Dockerfile
      target: runner
    profiles: ["dev", "staging", "prod"]
    env_file:
      - .env
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      PORT: 4200
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-skillstorm}
      # No default: container must fail if JWT_SECRET not set (production safety).
      JWT_SECRET: ${JWT_SECRET}
      REDIS_URL: redis://redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "${BACKEND_PORT:-4201}:4200"
    networks:
      - app

  frontend:
    build:
      context: ./client
      dockerfile: Dockerfile
      target: runner
      args:
        # Build-time fallback; runtime env from environment: below overrides for next start.
        API_PROXY_TARGET: http://backend:4200
    profiles: ["dev", "staging", "prod"]
    env_file:
      - .env
    environment:
      PORT: 3000
      # Proxy /api/* to backend. Must resolve host "backend" → same Docker network required.
      API_PROXY_TARGET: http://backend:4200
      NODE_ENV: ${NODE_ENV:-production}
    depends_on:
      backend:
        condition: service_started
    ports:
      - "3000:3000"
    networks:
      - app

volumes:
  pgdata:
