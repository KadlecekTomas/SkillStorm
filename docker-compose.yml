# All services use the same network so they resolve by service name (e.g. backend, postgres).
# Frontend proxy target: inside Docker use http://backend:4200; locally use http://localhost:4200.
networks:
  app:
    driver: bridge

services:
  postgres:
    image: postgres:15-alpine
    restart: unless-stopped
    profiles: ["dev", "staging", "prod"]
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-skillstorm}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    networks:
      - app

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    profiles: ["dev", "staging", "prod"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app

  # One-off: spustí full walkthrough seed (npm run seed:full). Po dokončení kontejner skončí.
  # Použití: docker compose --profile dev up -d postgres && docker compose --profile dev run --rm seed-full
  seed-full:
    build:
      context: ./server
      dockerfile: Dockerfile
      target: seed-runner
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-skillstorm}
    depends_on:
      postgres:
        condition: service_healthy
    command:
      - sh
      - -lc
      - "npx prisma migrate deploy && npx ts-node prisma/seed/full-walkthrough-seed.ts"
    profiles: ["dev", "staging", "prod"]
    networks:
      - app

  backend:
    build:
      context: ./server
      dockerfile: Dockerfile
      target: runner
    restart: unless-stopped
    profiles: ["dev", "staging", "prod"]
    env_file:
      - .env
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      PORT: 4200
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-skillstorm}
      # No default: container must fail if JWT_SECRET not set (production safety).
      JWT_SECRET: ${JWT_SECRET}
      REDIS_URL: redis://redis:6379
      RUN_MIGRATIONS: ${RUN_MIGRATIONS:-1}
      RUN_SEED: ${RUN_SEED:-0}
      DEMO_SEED: ${DEMO_SEED:-0}
      DEMO_MODE: ${DEMO_MODE:-0}
      METRICS_INGEST_KEY: ${METRICS_INGEST_KEY}
      PUBLIC_APP_URL: ${PUBLIC_APP_URL:-http://localhost:3000}
      API_URL: ${API_URL:-http://localhost:4200}
      ALLOW_CROSS_SITE_COOKIES: ${ALLOW_CROSS_SITE_COOKIES:-0}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:4200/health').then((res) => process.exit(res.ok ? 0 : 1)).catch(() => process.exit(1))",
        ]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s
    ports:
      - "4200:4200"
    networks:
      - app

  frontend:
    build:
      context: ./client
      dockerfile: Dockerfile
      target: runner
      args:
        # Build-time fallback; runtime env from environment: below overrides for next start.
        API_PROXY_TARGET: http://backend:4200
    restart: unless-stopped
    profiles: ["dev", "staging", "prod"]
    env_file:
      - .env
    environment:
      PORT: 3000
      # Proxy /api/* to backend. Must resolve host "backend" → same Docker network required.
      API_PROXY_TARGET: http://backend:4200
      NODE_ENV: ${NODE_ENV:-production}
      ENABLE_RBAC_TELEMETRY_CLIENT: ${ENABLE_RBAC_TELEMETRY_CLIENT:-0}
      DEMO_MODE: ${DEMO_MODE:-0}
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3000').then((res) => process.exit(res.ok ? 0 : 1)).catch(() => process.exit(1))",
        ]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s
    ports:
      - "3000:3000"
    networks:
      - app

volumes:
  pgdata:
